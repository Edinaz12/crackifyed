version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: crackifyed-postgres
    environment:
      POSTGRES_DB: crackifyed_db
      POSTGRES_USER: crackifyed_user
      POSTGRES_PASSWORD: crackifyed_secure_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crackifyed_user -d crackifyed_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crackifyed-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crackifyed-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: crackifyed_user
      DB_PASSWORD: crackifyed_secure_password
      DB_NAME: crackifyed_db
      DB_SYNCHRONIZE: 'false'
      DB_LOGGING: 'true'
      NODE_ENV: development
      APP_PORT: 3000
      JWT_SECRET: your_super_secret_jwt_key_change_this_in_production
      CORS_ORIGIN: 'http://localhost:3000,http://localhost:3001'
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    networks:
      - crackifyed-network

volumes:
  postgres_data:

networks:
  crackifyed-network:
    driver: bridge
