<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SwipeMatch AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="top-bar">
            <div class="icon">👤</div>
            <div class="logo">SwipeMatch</div>
            <div class="icon">💬</div>
        </header>

        <div id="card-stack" class="card-container">
            </div>

        <div class="status-overlay">
            <div class="status-icon nope">NOPE</div>
            <div class="status-icon like">LIKE</div>
        </div>

        <footer class="controls">
            <button class="btn undo">↺</button>
            <button class="btn discard" onclick="handleBtnClick(false)">✖</button>
            <button class="btn star">★</button>
            <button class="btn heart" onclick="handleBtnClick(true)">❤</button>
            <button class="btn lightning">⚡</button>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
