<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwipeMatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tinder">
        <div class="tinder--status">
            <i class="fa fa-remove"></i>
            <i class="fa fa-heart"></i>
        </div>

        <div class="tinder--cards">
            <div class="tinder--card">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=400&q=80">
                <h3>Sarah, 24</h3>
                <p>Love hiking and photography.</p>
            </div>
            <div class="tinder--card">
                <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=400&q=80">
                <h3>Jessica, 22</h3>
                <p>Coffee addict and dog mom.</p>
            </div>
        </div>

        <div class="tinder--buttons">
            <button id="nope">✖</button>
            <button id="love">❤</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
